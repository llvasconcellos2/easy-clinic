<template name="dashboard">
  {{> pageHeading title='common_dashboard' }}

  <div class="wrapper wrapper-content">

    <!-- KPI widgets -->
    <div class="row">
      <div class="col-sm-6 dash-col-5">
        <div class="ibox">
          <div class="ibox-content dash-kpi">
            <span class="dash-kpi-icon bg-blue"><i class="fa fa-users"></i></span>
            <div class="dash-kpi-body">
              <span class="dash-kpi-label">{{_ 'dashboard_patients'}}</span>
              <h2 class="dash-kpi-value">{{stats.totals.patients}}</h2>
              <small class="text-muted">{{_ 'dashboard_patients-total'}}</small>
            </div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 dash-col-5">
        <div class="ibox">
          <div class="ibox-content dash-kpi">
            <span class="dash-kpi-icon bg-green"><i class="fa fa-stethoscope"></i></span>
            <div class="dash-kpi-body">
              <span class="dash-kpi-label">{{_ 'dashboard_appointments'}}</span>
              <h2 class="dash-kpi-value">{{stats.totals.appointmentsMonth}}</h2>
              <small class="text-muted">{{_ 'dashboard_appointments-month'}}</small>
            </div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 dash-col-5">
        <div class="ibox">
          <div class="ibox-content dash-kpi">
            <span class="dash-kpi-icon bg-teal"><i class="fa fa-folder-open"></i></span>
            <div class="dash-kpi-body">
              <span class="dash-kpi-label">{{_ 'dashboard_records'}}</span>
              <h2 class="dash-kpi-value">{{stats.totals.recordsMonth}}</h2>
              <small class="text-muted">{{_ 'dashboard_records-month'}}</small>
            </div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 dash-col-5">
        <div class="ibox">
          <div class="ibox-content dash-kpi">
            <span class="dash-kpi-icon bg-yellow"><i class="fa fa-file-text"></i></span>
            <div class="dash-kpi-body">
              <span class="dash-kpi-label">{{_ 'dashboard_prescriptions'}}</span>
              <h2 class="dash-kpi-value">{{stats.totals.prescriptions}}</h2>
              <small class="text-muted">{{_ 'dashboard_prescriptions-total'}}</small>
            </div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 dash-col-5">
        <div class="ibox">
          <div class="ibox-content dash-kpi">
            <span class="dash-kpi-icon bg-money"><i class="fa fa-money"></i></span>
            <div class="dash-kpi-body">
              <span class="dash-kpi-label">{{_ 'reports_billing-month'}}</span>
              <h2 class="dash-kpi-value">{{billing.monthly}}</h2>
              <small class="text-muted">{{billing.appointments}} {{_ 'reports_appointments-unit'}}</small>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- today's agenda (top-left) sharing the row with the main chart -->
    <div class="row animated fadeInRight">
      <div class="col-lg-4">
        <div class="ibox">
          <div class="ibox-title">
            <h5>{{_ 'schedule_schedule'}} <small class="m-l-sm">{{_ 'schedule_timeline'}}</small></h5>
          </div>
          <div class="ibox-content inspinia-timeline dash-agenda" id="schedule-timeline">
            {{#if schedule.length}}
              {{#each schedule}}
                <div class="timeline-item">
                  <div class="row">
                    <div class="col-xs-3 date">
                      <i class="fa fa-clock-o"></i>
                      {{getTime start}}
                      <br />
                      <small class="text-navy">{{getHoursFromNow start}}</small>
                    </div>
                    <div class="col-xs-7 content no-top-border">
                      <p>
                        <div class="timeline-label">{{_ 'patients_patient'}}:</div>
                        {{#if patient}}
                          <a href="{{pathFor route='patientEdit' _id=patient}}"><b>{{getTitle title}}</b></a>
                        {{else}}
                          <b>{{getTitle title}}</b>
                        {{/if}}
                      </p>
                      <p class="m-b-xs">
                        <div class="timeline-label">{{_ 'schedule_status'}}:</div>
                        {{scheduleStatusBadge status}}
                      </p>
                      {{#if patientArrived status}}
                        <a href="{{pathFor route='patientEdit' _id=patient query='start_appointment=true&eventId='}}{{_id}}" class="btn btn-sm btn-primary iniciar-consulta-btn">
                          <i class="fa fa-play" aria-hidden="true"></i>&nbsp;&nbsp;{{_ 'patients_start-appointment'}}
                        </a>
                      {{else}}
                        <a href="{{pathFor route='patientEdit' _id=patient query='tab=records'}}" class="btn btn-sm btn-secondary iniciar-consulta-btn">
                          <i class="fa fa-folder-open-o" aria-hidden="true"></i>&nbsp;&nbsp;&nbsp;{{_ 'patients_records'}}
                        </a>
                      {{/if}}
                    </div>
                  </div>
                </div>
              {{/each}}
            {{else}}
              {{_ 'schedule_no-appointment-today'}}
            {{/if}}
          </div>
        </div>
      </div>
      <div class="col-lg-8">
        <div class="ibox">
          <div class="ibox-title"><h5><i class="fa fa-bar-chart"></i> {{_ 'dashboard_appts-by-month'}}</h5><small class="pull-right text-muted">{{_ 'dashboard_last-12-months'}}</small></div>
          <div class="ibox-content"><div class="dash-chart-wrap dash-chart-appts"><canvas id="dash-appts"></canvas></div></div>
        </div>
      </div>
    </div>

    <!-- secondary charts -->
    <div class="row">
      <div class="col-lg-4">
        <div class="ibox">
          <div class="ibox-title"><h5><i class="fa fa-pie-chart"></i> {{_ 'dashboard_records-by-type'}}</h5></div>
          <div class="ibox-content"><div class="dash-chart-wrap"><canvas id="dash-records"></canvas></div></div>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="ibox">
          <div class="ibox-title"><h5><i class="fa fa-bar-chart"></i> {{_ 'dashboard_patients-by-age'}}</h5></div>
          <div class="ibox-content"><div class="dash-chart-wrap"><canvas id="dash-age"></canvas></div></div>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="ibox">
          <div class="ibox-title"><h5><i class="fa fa-venus-mars"></i> {{_ 'dashboard_patients-by-gender'}}</h5></div>
          <div class="ibox-content"><div class="dash-chart-wrap"><canvas id="dash-gender"></canvas></div></div>
        </div>
      </div>
    </div>

  </div>
</template>
