<template name="login">
  <div class="middle-box text-center loginscreen animated fadeInDown">
    <div>
      <div class="login-logo-wrapper">
        <div>
          <div class="logo">
            <img src="/images/logo.svg" alt="{{_ 'common_app-name'}}" />
          </div>
        </div>
        <h3>{{_ 'login_welcome'}}</h3>
        <p>{{_ 'login_welcome-sub'}}</p>
      </div>
      {{> atForm}}
      <p class="m-t">
        <small
          >{{_ 'common_developed-by'}}
          <a
            target="_blank"
            rel="noopener"
            href="https://leonardo-vasconcellos.vercel.app/"
            >Leonardo LV</a
          >
          &copy; 2016-2017</small
        >
      </p>
    </div>
  </div>
</template>
