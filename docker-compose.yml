# Run Clínica Fácil (Meteor 1.4.1.3 + MongoDB) locally:
#
#   docker compose up --build
#
# Then open http://localhost:3000
#
# The first build is slow: it downloads Meteor's 1.4.1.3 dev bundle (~500 MB)
# and compiles the native bcrypt module. Subsequent runs reuse the cache.

services:
  # MongoDB 3.2 — matches the version bundled with Meteor 1.4's dev tooling.
  mongo:
    image: mongo:3.2
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongo", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 20

  # One-shot job: restore the bundled BSON dump (db/meteor) into the
  # `meteor` database, but only if it is still empty. Safe to leave enabled —
  # it skips on every run after the first seed.
  # `db/` is the cleaned + anonymized dump (see src/scripts/). It also carries the
  # patients c2_CPF unique+sparse index, so a fresh seed comes up healthy.
  seed:
    image: mongo:3.2
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./db:/dump:ro
    restart: "no"
    entrypoint: ["sh", "-c"]
    command:
      - >
        count=$$(mongo --quiet --host mongo meteor --eval 'db.patients.count()' 2>/dev/null || echo 0);
        if [ "$$count" -gt 0 ] 2>/dev/null; then
          echo "Database already seeded ($$count patients) — skipping.";
        else
          echo "Seeding 'meteor' database from /dump/meteor ...";
          mongorestore --host mongo --db meteor /dump/meteor;
        fi

  # The Meteor application server (dev mode).
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      mongo:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    environment:
      MONGO_URL: mongodb://mongo:27017/meteor
      ROOT_URL: http://localhost:3000
      PORT: "3000"
      # Code is bind-mounted from the Windows filesystem, where inotify events
      # don't reach the container. Force Meteor to poll so edits trigger the
      # usual rebuild + hot reload.
      METEOR_WATCH_FORCE_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      # Live-edit the source from the host; Meteor rebuilds on change.
      - ./src/app:/src/app
      # Keep the image-built artifacts that the bind mount would otherwise
      # shadow: node_modules holds the natively-compiled bcrypt, and
      # .meteor/local is the build cache. Named volumes are seeded from the
      # image on first run, so the compiled deps survive.
      - app-node-modules:/src/app/node_modules
      - meteor-local:/src/app/.meteor/local
    restart: unless-stopped

volumes:
  mongo-data:
  meteor-local:
  app-node-modules:
